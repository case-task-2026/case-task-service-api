services:
  postgres:
    image: postgres:16-alpine
    container_name: case-task-service-postgres
    environment:
      POSTGRES_DB: case_task_service
      POSTGRES_USER: case_task_service
      POSTGRES_PASSWORD: case_task_service
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U case_task_service -d case_task_service"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: