server:
  port: ${SERVER_PORT:4000}
  shutdown: graceful

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info

springdoc:
  packages-to-scan: uk.gov.hmcts.reform.dev
  writer-with-order-by-keys: true

spring:
  application:
    name: case-task-service-api
  config:
    import: optional:configtree:/mnt/secrets/case-task-service-api/
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${CASE_TASK_DB_URL:jdbc:postgresql://localhost:5433/case_task_service}
    username: ${CASE_TASK_DB_USERNAME:case_task_service}
    password: ${CASE_TASK_DB_PASSWORD:case_task_service}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration